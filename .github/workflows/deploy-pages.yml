name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-docs.txt

      - name: Install docs toolchain
        run: pip install -r requirements-docs.txt

      - name: Build MkDocs site
        run: python -m mkdocs build --strict

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: presentation/package-lock.json

      - name: Install Slidev deps
        working-directory: presentation
        run: npm ci

      - name: Build Slidev deck
        working-directory: presentation
        run: npm run build

      - name: Merge Slidev deck into site/slides
        run: |
          mkdir -p site/slides
          cp -R presentation/dist/. site/slides/

      - name: Add SPA fallbacks for Slidev routes
        # GitHub Pages only serves 404.html from the site root, so direct
        # visits to Slidev sub-routes (/slides/presenter/, /slides/overview/,
        # per-slide URLs like /slides/5/ or /slides/presenter/5/) would fall
        # through to the MkDocs 404. We pre-generate real index.html files
        # for every known route so the SPA boots and Vue Router takes over.
        run: |
          set -e
          # Count slides in the deck so we know how many per-slide routes to seed
          SLIDE_COUNT=$(grep -c '^---$' presentation/slides.md || true)
          echo "Seeding SPA fallbacks for $SLIDE_COUNT slides"
          for route in presenter overview entry notes print play embedded; do
            mkdir -p "site/slides/$route"
            cp site/slides/index.html "site/slides/$route/index.html"
          done
          for n in $(seq 1 "$SLIDE_COUNT"); do
            mkdir -p "site/slides/$n" \
                     "site/slides/presenter/$n" \
                     "site/slides/notes/$n" \
                     "site/slides/embedded/$n"
            cp site/slides/index.html "site/slides/$n/index.html"
            cp site/slides/index.html "site/slides/presenter/$n/index.html"
            cp site/slides/index.html "site/slides/notes/$n/index.html"
            cp site/slides/index.html "site/slides/embedded/$n/index.html"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
